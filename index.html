<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }

#loader {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px; background: #000; z-index: 10;
}
#loader-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transition: opacity .6s ease; opacity: 0;
}
.spinner {
  position: relative; z-index: 1;
  width: 72px; height: 72px;
  border: 5px solid rgba(255,255,255,.15);
  border-top-color: #60a5fa; border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader-text { position: relative; z-index: 1; font-size: .95rem; color: rgba(255,255,255,.6); letter-spacing: .04em; text-shadow: 0 1px 4px #000; }

#player { position: fixed; inset: 0; display: none; background: #000; }
iframe { width: 100%; height: 100%; border: none; }

#usage, #err {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  background: #000; gap: 10px; z-index: 20;
}
#usage p { font-size: 1.05rem; color: rgba(255,255,255,.65); line-height: 2; }
#err-title { font-size: 2.4rem; font-weight: 700; color: #fff; margin-bottom: 18px; }
#err-link { font-size: 1.1rem; color: #60a5fa; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<div id="loader">
  <div id="loader-bg"></div>
  <div class="spinner"></div>
  <div id="loader-text">Loading stream...</div>
</div>

<div id="usage">
  <p><span style="color:#fff;font-size:1.2rem">Stream Player</span><br><br>
  <code>?id=550</code> — movie<br>
  <code>?id=456&s=1&e=1</code> — TV</p>
</div>

<div id="err">
  <div id="err-title">Error Occurred</div>
  <a id="err-link" href="#">Try vidsrc.xyz instead?</a>
  <div id="err-detail" style="margin-top:20px; color:gray; font-size:0.8rem;"></div>
</div>

<div id="player"></div>

<script>
var TMDB_KEY = '3a73619bbb8fc6d47742d1b5b2b707b5';
var p = new URLSearchParams(location.search);
var id = p.get('id'), s = p.get('s'), e = p.get('e');

// Loading Messages
var MESSAGES = ['Summoning pixels...', 'Bypassing firewalls...', 'Almost ready...'];
var msgEl = document.getElementById('loader-text');
var msgIdx = 0;
setInterval(() => {
  msgIdx = (msgIdx + 1) % MESSAGES.length;
  msgEl.textContent = MESSAGES[msgIdx];
}, 2000);

if (!id) {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('usage').style.display = 'flex';
} else {
  loadBackdrop(id, !!s);
  fetch('/api?' + p.toString())
    .then(r => r.json())
    .then(d => {
      if (d.error) throw new Error(d.error);
      play(d.url);
    })
    .catch(err => showErr(err.message));
}

function play(embedUrl) {
  const container = document.getElementById('player');
  container.innerHTML = `<iframe src="${embedUrl}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
  container.style.display = 'block';
  document.getElementById('loader').style.display = 'none';
}

function showErr(msg) {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('err-detail').textContent = msg;
}

function loadBackdrop(id, isTv) {
  fetch(`https://api.themoviedb.org/3/${isTv?'tv':'movie'}/${id}?api_key=${TMDB_KEY}`)
    .then(r => r.json())
    .then(d => {
      const img = d.backdrop_path || d.poster_path;
      if (img) {
        const bg = document.getElementById('loader-bg');
        bg.style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${img})`;
        bg.style.opacity = '0.4';
      }
    });
}
</script>
</body>
</html>
